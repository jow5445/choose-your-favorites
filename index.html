<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Site!🧋</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css">
</head>

<body>

    <h2>Choose your favorite sites to follow Boba Dropa 🧋</h2>

    <div class="container">

        <label class="checkbox">
            <input type="checkbox" name="social" value="instagram">
            <div class="box">
                <i class="fab fa-instagram"></i>
                <p data-text="Instagram">Instagram</p>
            </div>
        </label>

        <label class="checkbox">
            <input type="checkbox" name="social" value="facebook">
            <div class="box">
                <i class="fab fa-facebook-square"></i>
                <p data-text="Facebook">Facebook</p>
            </div>
        </label>

        <label class="checkbox">
            <input type="checkbox" name="social" value="twitter">
            <div class="box">
                <i class="fab fa-twitter"></i>
                <p data-text="Twitter">Twitter</p>
            </div>
        </label>

        <label class="checkbox">
            <input type="checkbox" name="social" value="whatsapp">
            <div class="box">
                <i class="fab fa-whatsapp"></i>
                <p data-text="WhatsApp">WhatsApp</p>
            </div>
        </label>

        <label class="checkbox">
            <input type="checkbox" name="social" value="github">
            <div class="box">
                <i class="fab fa-github"></i>
                <p data-text="GitHub">GitHub</p>
            </div>
        </label>

        <label class="checkbox">
            <input type="checkbox" name="social" value="discord">
            <div class="box">
                <i class="fab fa-discord"></i>
                <p data-text="Discord">Discord</p>
            </div>
        </label>

    </div>

</body>
</html>
